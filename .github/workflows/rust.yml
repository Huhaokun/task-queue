name: Rust

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Stable quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy
      - name: Check formatting
        run: cargo +stable fmt --all --check
      - name: Run Clippy
        run: cargo +stable clippy --all-targets --locked -- -D warnings
      - name: Run tests
        run: cargo +stable test --all-targets --locked
      - name: Run documentation tests
        run: cargo +stable test --doc --locked
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo +stable doc --no-deps --locked
      - name: Verify release package
        run: cargo +stable package --locked

  msrv:
    name: Rust 1.85 MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MSRV toolchain
        run: rustup toolchain install 1.85.0 --profile minimal
      - name: Check MSRV
        run: cargo +1.85.0 check --all-targets --locked
